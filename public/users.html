<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css?v=2" type="text/css" />
    <title>Users — XYZ University</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="users-page">
      <nav class="nav-bar">
        <div class="nav-brand">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
            <title>University icon</title>
            <path d="M12 14l9-5-9-5-9 5 9 5z" />
          </svg>
          <span>XYZ University</span>
        </div>
        <div class="nav-links">
          <a href="/" class="nav-link">Sign Up</a>
          <a href="/users" class="nav-link active">Users</a>
        </div>
      </nav>

      <main class="users-main">
        <div class="users-header">
          <h1>Registered Users</h1>
          <button type="button" id="refreshBtn" class="refresh-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <title>Refresh</title>
              <polyline points="23 4 23 10 17 10" />
              <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" />
            </svg>
            Refresh
          </button>
        </div>

        <!-- Loading state -->
        <div id="loadingState" class="loading-state">
          <div class="skeleton skeleton-row"></div>
          <div class="skeleton skeleton-row"></div>
          <div class="skeleton skeleton-row"></div>
          <div class="skeleton skeleton-row"></div>
          <div class="skeleton skeleton-row"></div>
        </div>

        <!-- Empty state -->
        <div id="emptyState" class="empty-state hidden">
          <div class="empty-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <title>No users</title>
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
              <circle cx="9" cy="7" r="4" />
              <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
              <path d="M16 3.13a4 4 0 0 1 0 7.75" />
            </svg>
          </div>
          <h2>No users yet</h2>
          <p>Be the first to <a href="/">create an account</a>!</p>
        </div>

        <!-- Error state -->
        <div id="errorState" class="error-state hidden">
          <div class="error-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <title>Error</title>
              <circle cx="12" cy="12" r="10" />
              <line x1="12" y1="8" x2="12" y2="12" />
              <line x1="12" y1="16" x2="12.01" y2="16" />
            </svg>
          </div>
          <h2>Could not load users</h2>
          <p>Please check your connection and try again.</p>
          <button type="button" id="retryBtn" class="refresh-btn">Try Again</button>
        </div>

        <!-- Users table -->
        <div id="usersTable" class="users-table-wrapper hidden">
          <table class="users-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Email</th>
                <th>Username</th>
                <th>User ID</th>
              </tr>
            </thead>
            <tbody id="usersTbody"></tbody>
          </table>
          <p id="userCount" class="user-count"></p>
        </div>
      </main>
    </div>

    <script src="./users-list.js"></script>
  </body>
</html>
