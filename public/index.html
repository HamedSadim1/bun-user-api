<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css?v=2" type="text/css" />
    <title>XYZ University — Sign Up</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <!-- Toast container -->
      <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>

      <!-- Left: Brand panel -->
      <div class="brand-panel">
        <div class="brand-content">
          <div class="brand-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <title>University icon</title>
              <path d="M12 14l9-5-9-5-9 5 9 5z" />
              <path d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z" />
            </svg>
          </div>
          <h1>XYZ University</h1>
          <p class="brand-subtitle">Your gateway to knowledge and opportunity</p>
          <div class="brand-features">
            <div class="feature">
              <span class="feature-icon" aria-hidden="true">📚</span>
              <span>Access all course materials</span>
            </div>
            <div class="feature">
              <span class="feature-icon" aria-hidden="true">🎓</span>
              <span>Track your academic progress</span>
            </div>
            <div class="feature">
              <span class="feature-icon" aria-hidden="true">💬</span>
              <span>Connect with peers & faculty</span>
            </div>
          </div>
        </div>
        <div class="brand-pattern" aria-hidden="true"></div>
      </div>

      <!-- Right: Signup form -->
      <div class="form-panel">
        <div class="form-wrapper">
          <div class="form-header">
            <h2>Create your account</h2>
            <p>Join thousands of students already learning with us</p>
          </div>

          <form id="signupForm" novalidate>
            <div class="input-group">
              <label for="email">Email address</label>
              <div class="input-wrapper">
                <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                  <title>Email icon</title>
                  <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
                  <polyline points="22,6 12,13 2,6" />
                </svg>
                <input
                  type="email"
                  id="email"
                  name="email"
                  placeholder="jane@example.com"
                  required
                  autocomplete="email"
                />
                <span class="validation-icon" aria-hidden="true"></span>
              </div>
              <span class="error-message" id="email-error" role="alert"></span>
            </div>

            <div class="input-group">
              <label for="username">Username</label>
              <div class="input-wrapper">
                <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                  <title>User icon</title>
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                  <circle cx="12" cy="7" r="4" />
                </svg>
                <input
                  type="text"
                  id="username"
                  name="username"
                  placeholder="Jane Doe"
                  required
                  minlength="2"
                  maxlength="50"
                  autocomplete="name"
                />
                <span class="validation-icon" aria-hidden="true"></span>
              </div>
              <span class="error-message" id="username-error" role="alert"></span>
            </div>

            <div class="input-group">
              <label for="password">Password</label>
              <div class="input-wrapper">
                <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                  <title>Lock icon</title>
                  <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                  <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                </svg>
                <input
                  type="password"
                  id="password"
                  name="password"
                  placeholder="Min. 6 characters"
                  required
                  minlength="6"
                  autocomplete="new-password"
                />
                <button type="button" class="toggle-password" aria-label="Toggle password visibility">
                  <svg class="eye-icon eye-visible" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                    <title>Show password</title>
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                    <circle cx="12" cy="12" r="3" />
                  </svg>
                  <svg class="eye-icon eye-hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                    <title>Hide password</title>
                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" />
                    <line x1="1" y1="1" x2="23" y2="23" />
                  </svg>
                </button>
              </div>
              <span class="error-message" id="password-error" role="alert"></span>
            </div>

            <div class="strength-meter hidden" id="strength-meter" role="status" aria-live="polite">
              <div class="strength-bar" id="strength-bar"></div>
              <span class="strength-text" id="strength-text"></span>
            </div>

            <button type="submit" id="formBtn" class="submit-btn">
              <span class="btn-text">Create Account</span>
              <span class="btn-loader hidden" aria-hidden="true">
                <svg class="spinner" viewBox="0 0 24 24">
                  <title>Loading</title>
                  <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" fill="none" stroke-dasharray="31.4 31.4" />
                </svg>
              </span>
            </button>

            <p class="form-footer">
              Already have an account? <a href="/" class="signin-link">Sign in</a>
            </p>
          </form>
        </div>
      </div>
    </div>

    <script>
      const form = document.getElementById("signupForm");
      const toast = document.getElementById("toast");
      const strengthMeter = document.getElementById("strength-meter");
      const strengthBar = document.getElementById("strength-bar");
      const strengthText = document.getElementById("strength-text");
      const submitBtn = document.getElementById("formBtn");
      const btnText = submitBtn.querySelector(".btn-text");
      const btnLoader = submitBtn.querySelector(".btn-loader");
      const togglePassword = document.querySelector(".toggle-password");
      const passwordInput = document.getElementById("password");

      // Toggle password visibility
      togglePassword.addEventListener("click", () => {
        const isPassword = passwordInput.type === "password";
        passwordInput.type = isPassword ? "text" : "password";
        togglePassword.classList.toggle("visible", isPassword);
      });

      // Password strength checker
      passwordInput.addEventListener("input", () => {
        const val = passwordInput.value;
        if (!val) {
          strengthMeter.classList.add("hidden");
          return;
        }
        strengthMeter.classList.remove("hidden");

        let score = 0;
        if (val.length >= 6) score++;
        if (val.length >= 10) score++;
        if (/[A-Z]/.test(val)) score++;
        if (/[0-9]/.test(val)) score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;

        const levels = ["Very weak", "Weak", "Fair", "Good", "Strong"];
        const colors = ["#ef4444", "#f97316", "#eab308", "#22c55e", "#16a34a"];
        const widths = ["20%", "40%", "60%", "80%", "100%"];

        const idx = Math.min(score, levels.length - 1);
        strengthText.textContent = levels[idx];
        strengthText.style.color = colors[idx];
        strengthBar.style.width = widths[idx];
        strengthBar.style.background = colors[idx];
      });

      // Toast helper
      function showToast(message, type = "success") {
        toast.textContent = message;
        toast.className = `toast toast-${type}`;
        setTimeout(() => {
          toast.classList.add("hidden");
        }, 4000);
      }

      // Field validation
      function validateField(input) {
        const errorEl = document.getElementById(`${input.id}-error`);
        const wrapper = input.closest(".input-wrapper");
        const icon = wrapper.querySelector(".validation-icon");

        let isValid = true;
        let message = "";

        if (input.id === "email") {
          const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
          if (!input.value.trim()) {
            isValid = false;
            message = "Email is required";
          } else if (!emailRegex.test(input.value)) {
            isValid = false;
            message = "Please enter a valid email address";
          }
        } else if (input.id === "username") {
          if (!input.value.trim()) {
            isValid = false;
            message = "Username is required";
          } else if (input.value.length < 2) {
            isValid = false;
            message = "Username must be at least 2 characters";
          }
        } else if (input.id === "password") {
          if (!input.value) {
            isValid = false;
            message = "Password is required";
          } else if (input.value.length < 6) {
            isValid = false;
            message = "Password must be at least 6 characters";
          }
        }

        if (!isValid) {
          wrapper.classList.add("invalid");
          wrapper.classList.remove("valid");
          icon.textContent = "✕";
          errorEl.textContent = message;
        } else {
          wrapper.classList.add("valid");
          wrapper.classList.remove("invalid");
          icon.textContent = "✓";
          errorEl.textContent = "";
        }

        return isValid;
      }

      // Live validation on blur
      document.querySelectorAll("input").forEach((input) => {
        input.addEventListener("blur", () => {
          if (input.value) validateField(input);
        });
        input.addEventListener("input", () => {
          const wrapper = input.closest(".input-wrapper");
          if (wrapper.classList.contains("invalid")) {
            validateField(input);
          }
        });
      });

      // Form submit
      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        // Validate all fields
        const inputs = form.querySelectorAll("input");
        let allValid = true;
        inputs.forEach((input) => {
          if (!validateField(input)) {
            allValid = false;
          }
        });

        if (!allValid) return;

        // Show loading state
        submitBtn.disabled = true;
        btnText.classList.add("hidden");
        btnLoader.classList.remove("hidden");

        try {
          const formData = new FormData(form);
          const data = Object.fromEntries(formData.entries());

          const response = await fetch("/addUser", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data),
          });

          if (response.ok) {
            showToast("Account created successfully! 🎉", "success");
            form.reset();
            strengthMeter.classList.add("hidden");
            document.querySelectorAll(".validation-icon").forEach((icon) => {
              icon.textContent = "";
            });
            document.querySelectorAll(".input-wrapper").forEach((w) => {
              w.classList.remove("valid", "invalid");
            });
          } else if (response.status === 400) {
            const err = await response.json();
            showToast(err.error || "Validation failed. Please check your input.", "error");
          } else {
            showToast("Something went wrong. Please try again.", "error");
          }
        } catch {
          showToast("Could not connect to the server.", "error");
        } finally {
          submitBtn.disabled = false;
          btnText.classList.remove("hidden");
          btnLoader.classList.add("hidden");
        }
      });
    </script>
  </body>
</html>
